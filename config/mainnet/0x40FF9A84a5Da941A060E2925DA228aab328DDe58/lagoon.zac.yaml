roles_modifier_address: "{{ aliases.modifiers.poc_test_cs_modifier }}"
safe_address: "{{ aliases.safes.poc_test_cs_treasury_wallet_id_diversified_income }}"
chain_id: 1
name: My Safe Lagoon Vault Manager
description: Approve the vault to spend its asset, settle deposits/redeems, and manage NAV on a Lagoon vault
configs:
  - template: "../../../zac/templates/lagoon/lagoon.tmpl"
    key: LAGOON
    members:
      - "{{ aliases.signers.poc_test_cs_operation_manager }}"
    params:
      # One vault per config. The vault contract address — defined in
      # aliases/mainnet/lagoon.yaml (referenced as aliases.lagoon.<key>).
      vault: "{{ aliases.lagoon.poc_test_cs_lagoon }}"
      # The vault's underlying asset token (its `asset()`): the role is granted
      # approve(spender = vault) on THIS token only. Token alias KEY, resolved
      # via aliases.tokens[<key>] in the template. TODO(confirm) it matches
      # the vault's actual asset() — defaulted to USDC.
      asset: "USDC"
