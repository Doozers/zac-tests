roles_modifier_address: "{{ aliases.modifiers.cs_diversified_strategy_treasury_wallet_modifier }}"
safe_address: "{{ aliases.safes.cs_diversified_strategy_treasury_wallet_safe }}"
chain_id: 1
name: My Safe Lagoon Vault Manager
description: Approve the vault to spend its asset, settle deposits/redeems, and manage NAV on a Lagoon vault
configs:
  - template: "../../../zac/templates/lagoon/lagoon.tmpl"
    key: LAGOON
    members:
      - "{{ aliases.signers.cs_operation_quorum }}"
    params:
      # One vault per config. The vault contract address — defined in
      # aliases/mainnet/lagoon.yaml (referenced as aliases.lagoon.<key>).
      vault: "{{ aliases.lagoon.cs_diversified_strategy_lagoon }}"
      # The vault's underlying asset token (its `asset()`): the role is granted
      # approve(spender = vault) on THIS token only. See cs_lagoon_asset in
      # aliases/mainnet/lagoon.yaml — confirm it matches the vault's asset().
      asset: "USDC"
