configs:
  - template: "../../../zac/templates/morpho_blue/morpho_blue.tmpl"
    key: MORPHO_BLUE
    members:
      - "{{ aliases.signers.cs_execution_quorum }}"
    params:
      markets:
        - "usdc_cbbtc_86"
        - "usdc_wbtc_86"
        - "usdc_pteth_915"
        - "usdc_wsteth_86"
        - "usdc_resteth_915"
