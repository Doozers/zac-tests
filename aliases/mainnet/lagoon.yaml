# Lagoon vault aliases — mainnet.
#
# Lagoon vault contracts are CASE-SPECIFIC: each deployment manages its
# own vault. No global aliases are shipped here — define entries
# per-deployment as you need them, then reference them in templates via
# the standard alias syntax (aliases.lagoon.<your_key>).
#
# Lagoon docs: https://docs.lagoon.finance/developer-hub/smart-contract-reference
#
# Example (uncomment and replace with your vault address):
#

# POC test — fork of the 0x40FF… deployment's lagoon vault alias (same
# address), used ONLY by config/mainnet/0x40FF9A84…/. The original cs_lagoon*
# aliases above are kept for the 0x1b50… safe. (No asset alias here: the
# lagoon template now takes `asset` as a token KEY, e.g. "USDC".)
poc_test_cs_lagoon: "0x30a3699e0dcea6bdc8bb2c13e74a2324e0b20116"

cs_diversified_strategy_lagoon: "0xcd65f0403947cfcd8e4a60b43bbe8b8d5c41242e"
