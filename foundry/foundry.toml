# Coinshares-ZAC uses fork tests exclusively (no src contracts). The
# `default` profile compiles only — skips all tests — so plain
# `forge test` is a no-op. The `fork` profile runs tests under `test/`,
# with FFI enabled and the fs_permissions ZAC's CLI needs to read
# configs/aliases and write generated YAML + plan JSON to /tmp.
#
# Usage (with anvil forking an upstream RPC):
#   anvil --fork-url $UPSTREAM --port 8546 --quiet &
#   cd foundry && FOUNDRY_PROFILE=fork RPC_URL=http://127.0.0.1:8546 forge test -vvv

[profile.default]
src = "src"
out = "out"
libs = ["../zac/foundry/lib"]
test = "test"
no_match_path = "**"

[profile.fork]
src = "src"
out = "out"
libs = ["../zac/foundry/lib"]
test = "test"
ffi = true
no_match_path = "__never_match__"
remappings = [
  "forge-std/=../zac/foundry/lib/forge-std/src/",
]
fs_permissions = [
  { access = "read-write", path = "../config" },
  { access = "read", path = "../zac" },
  { access = "read", path = "../aliases" },
  { access = "read", path = "../config.yaml" },
  { access = "read-write", path = "/tmp" },
]
